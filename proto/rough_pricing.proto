syntax = "proto3";

package roughvol;

// ── Instrument messages ────────────────────────────────────────────────────

message VanillaInstrument {
  double strike   = 1;
  double maturity = 2;
  bool   is_call  = 3;
}

message AsianInstrument {
  double maturity         = 1;
  double strike           = 2;
  string callput          = 3;          // "call" or "put"
  repeated double obs_times = 4;        // empty → use model grid
  bool   include_t0       = 5;
  string interp           = 6;          // "linear" or "ladder"
}

// ── Model parameter messages ───────────────────────────────────────────────

message GBMParams {
  double sigma = 1;
}

message HestonParams {
  double kappa = 1;
  double theta = 2;
  double xi    = 3;
  double rho   = 4;
  double v0    = 5;
}

message RoughBergomiParams {
  double hurst = 1;
  double eta   = 2;
  double rho   = 3;
  double xi0   = 4;
}

// ── Market data message ────────────────────────────────────────────────────

message MarketData {
  double spot      = 1;
  double rate      = 2;
  double div_yield = 3;
}

// ── Monte Carlo pricing ────────────────────────────────────────────────────

message MCPriceRequest {
  oneof model {
    GBMParams           gbm            = 1;
    HestonParams        heston         = 2;
    RoughBergomiParams  rough_bergomi  = 10;
  }
  oneof instrument {
    VanillaInstrument vanilla = 3;
    AsianInstrument   asian   = 4;
  }
  MarketData market   = 5;
  int32  n_paths      = 6;   // 0 → server default (20_000)
  int32  n_steps      = 7;   // 0 → server default (50)
  int32  seed         = 8;   // -1 → server default (42)
  bool   antithetic   = 9;
}

message MCPriceResponse {
  double price   = 1;
  double stderr  = 2;
  double ci95_lo = 3;
  double ci95_hi = 4;
  int32  n_paths = 5;
  int32  n_steps = 6;
}

// ── Black-Scholes closed-form ──────────────────────────────────────────────

message BSPriceRequest {
  double spot     = 1;
  double strike   = 2;
  double maturity = 3;
  double rate     = 4;
  double div      = 5;
  double vol      = 6;
  bool   is_call  = 7;
}

message BSPriceResponse {
  double price = 1;
}

// ── Implied volatility ─────────────────────────────────────────────────────

message ImpliedVolRequest {
  double price    = 1;
  double spot     = 2;
  double strike   = 3;
  double maturity = 4;
  double rate     = 5;
  double div      = 6;
  bool   is_call  = 7;
}

message ImpliedVolResponse {
  double vol = 1;
}

// ── Calibration ────────────────────────────────────────────────────────────

message OptionQuote {
  double strike           = 1;
  double maturity_years   = 2;
  bool   is_call          = 3;
  double market_price     = 4;
}

message TimedOptionQuote {
  OptionQuote quote            = 1;
  int64       observed_at_ms   = 2;
}

enum ModelType {
  BS             = 0;
  GBM_MC         = 1;
  HESTON         = 2;
  ROUGH_BERGOMI  = 3;
}

message CalibrateRequest {
  ModelType            model_type  = 1;
  double               spot        = 2;
  repeated OptionQuote quotes      = 3;
  double               rate        = 4;
  double               div         = 5;
  // optional warm-start: first element is x0_sigma for GBM;
  // full 5-vec for Heston; 4-vec (hurst, eta, rho, xi0) for rough Bergomi
  repeated double      x0          = 6;
  // MC engine config (0 → server defaults)
  int32  n_paths      = 7;
  int32  n_steps      = 8;
  int32  seed         = 9;
  bool   antithetic   = 10;
}

message CalibrateResponse {
  string               model_name        = 1;
  map<string, double>  params            = 2;
  double               mse               = 3;
  double               elapsed_s         = 4;
  repeated double      per_option_ivols  = 5;  // BS only
}

message CalibrationWindowRequest {
  string               asset_id               = 1;
  ModelType            model_type             = 2;
  double               spot                   = 3;
  repeated TimedOptionQuote quotes            = 4;
  double               rate                   = 5;
  double               div                    = 6;
  repeated double      x0                     = 7;
  int32                n_paths                = 8;
  int32                n_steps                = 9;
  int32                seed                   = 10;
  bool                 antithetic             = 11;
  int64                as_of_ms               = 12;
  int64                calibration_window_ms  = 13;
  int64                update_interval_ms     = 14;
  bool                 force_refresh          = 15;
}

message CalibrationWindowResponse {
  CalibrateResponse calibration             = 1;
  bool              recalibrated            = 2;
  int64             calibrated_at_ms        = 3;
  int64             next_update_due_ms      = 4;
  int64             window_start_ms         = 5;
  int64             window_end_ms           = 6;
  int32             quotes_in_window        = 7;
  int32             quotes_total            = 8;
}

// ── Service ────────────────────────────────────────────────────────────────

service RoughPricingService {
  rpc MCPrice                 (MCPriceRequest)           returns (MCPriceResponse);
  rpc BSPrice                 (BSPriceRequest)           returns (BSPriceResponse);
  rpc ImpliedVol              (ImpliedVolRequest)        returns (ImpliedVolResponse);
  rpc Calibrate               (CalibrateRequest)         returns (CalibrateResponse);
  rpc UpdateCalibrationWindow (CalibrationWindowRequest) returns (CalibrationWindowResponse);
}
